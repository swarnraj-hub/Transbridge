name: CoinsPH FX Export

on:
  workflow_dispatch:

jobs:
  coinsph-export:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      COINSPH_EMAIL:         ${{ secrets.COINSPH_EMAIL }}
      COINSPH_PASSWORD:      ${{ secrets.COINSPH_PASSWORD }}
      COINSPH_TOTP_SECRET:   ${{ secrets.COINSPH_TOTP_SECRET }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      S3_BUCKET:             ${{ secrets.S3_BUCKET }}
      S3_PREFIX:             coinsph_fx/raw
      AWS_REGION:            ap-southeast-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright boto3 botocore

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Run CoinsPH automation
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python coinsph.py

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: artifacts/
          retention-days: 7
